<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frontend</title>
</head>

<body class="bg-gray-900 text-white h-dvh grid gap-5">
  <main class="grid place-content-center relative">
    <div class="caret" data-caret></div>
    <div class="flex gap-5">
      <div data-word="0" class="h-full center text-5xl leading-12 flex">
        <letter class="active" data-word="0" data-letter="0">h</letter>
        <letter data-word="0" data-letter="1">e</letter>
        <letter data-word="0" data-letter="2">l</letter>
        <letter data-word="0" data-letter="3">l</letter>
        <letter data-word="0" data-letter="4">o</letter>
      </div>
      <div data-word="1" class="h-full center text-5xl leading-12 flex">
        <letter data-word="1" data-letter="0">w</letter>
        <letter data-word="1" data-letter="1">o</letter>
        <letter data-word="1" data-letter="2">r</letter>
        <letter data-word="1" data-letter="3">l</letter>
        <letter data-word="1" data-letter="4">d</letter>
      </div>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
